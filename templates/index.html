<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #222228;
    --border: #2e2e38; --accent: #e8d5a3; --accent2: #7c9bb5;
    --text: #e8e8ec; --text-dim: #888896; --radius: 8px;
    --toolbar-h: 64px; --tabs-h: 48px;
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar { height: var(--toolbar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0; z-index: 100; overflow-x: auto; }
  .logo { font-family: 'Fraunces', serif; font-size: 20px; color: var(--accent); margin-right: 4px; white-space: nowrap; }
  .divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

  .tool-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); border-radius: var(--radius); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; transition: all 0.15s; white-space: nowrap; }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { background: var(--accent); color: #0f0f11; border-color: var(--accent); font-weight: 500; }
  .tool-btn svg { width: 14px; height: 14px; }
  #upload-btn { background: var(--accent2); border-color: var(--accent2); color: #0f0f11; }
  #save-btn { background: #4a9e6e; border-color: #4a9e6e; color: white; margin-left: auto; }
  #save-btn:disabled, #btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-scan { background: #555; border-color: #666; color: #ddd; }
  #btn-scan:not(:disabled):hover { background: #333; border-color: var(--accent); color: var(--accent); }

  #font-size-input { width: 52px; padding: 6px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; text-align: center; }
  #text-color-input { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; padding: 2px; background: transparent; }
  #text-controls { display: none; align-items: center; gap: 6px; }
  #text-controls.visible { display: flex; }
  label.ctrl-label { font-size: 11px; color: var(--text-dim); }

  /* Tabs */
  #tabs-bar { height: var(--tabs-h); background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; padding: 0 16px; gap: 4px; overflow-x: auto; flex-shrink: 0; }
  .page-tab { padding: 8px 16px; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; color: var(--text-dim); background: transparent; font-family: 'DM Mono', monospace; transition: all 0.15s; white-space: nowrap; }
  .page-tab:hover { color: var(--text); border-color: var(--border); }
  .page-tab.active { background: var(--bg); border-color: var(--border); color: var(--accent); }

  /* Main */
  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
  #canvas-container { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 32px; background: var(--bg); }
  #canvas-wrapper { position: relative; display: inline-block; box-shadow: 0 8px 40px rgba(0,0,0,0.6); border-radius: 2px; }
  #pdf-image { display: block; max-width: 100%; }
  #draw-canvas { position: absolute; top: 0; left: 0; }

  /* Text overlay */
  .text-overlay { position: absolute; cursor: move; user-select: none; white-space: pre; border: 1px dashed transparent; padding: 2px 4px; border-radius: 2px; min-width: 20px; line-height: 1.2; }
  .text-overlay:hover { border-color: rgba(124,155,181,0.5); }
  .text-overlay.selected { border-color: var(--accent2); }

  /* Floating text toolbar */
  #text-toolbar {
    display: none;
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    gap: 8px;
    align-items: center;
    z-index: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    pointer-events: all;
  }
  #text-toolbar.visible { display: flex; }
  #text-toolbar input[type=number] { width: 48px; padding: 4px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; }
  #text-toolbar input[type=color] { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 50%; padding: 1px; background: transparent; cursor: pointer; }
  .tb-btn { padding: 4px 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); border-radius: 4px; cursor: pointer; font-size: 12px; font-family: serif; transition: all 0.1s; }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tb-btn.active { background: var(--accent); color: #0f0f11; border-color: var(--accent); }
  .tb-sep { width: 1px; height: 20px; background: var(--border); }
  .tb-delete { color: #e05555; border-color: #e05555; }
  .tb-delete:hover { background: #e05555; color: white; }

  /* Mask */
  .mask-element { position: absolute; background: white; border: 1px solid rgba(200,200,200,0.2); cursor: move; }
  .mask-element .delete-mask { display: none; position: absolute; top: -10px; right: -10px; width: 18px; height: 18px; background: #e05555; color: white; border-radius: 50%; font-size: 10px; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
  .mask-element:hover .delete-mask { display: flex; }
  .mask-element .resize-handle { display: none; position: absolute; bottom: -5px; right: -5px; width: 10px; height: 10px; background: var(--accent2); border-radius: 2px; cursor: se-resize; }
  .mask-element:hover .resize-handle { display: block; }

  /* Welcome */
  #welcome { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #welcome h2 { font-family: 'Fraunces', serif; font-size: 32px; color: var(--accent); font-weight: 300; }
  #welcome p { color: var(--text-dim); font-size: 13px; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 48px 64px; display: flex; flex-direction: column; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; }
  .drop-zone:hover { border-color: var(--accent); background: rgba(232,213,163,0.04); }
  .drop-zone svg { color: var(--accent2); }

  /* Loading */
  #loading { display: none; position: fixed; inset: 0; background: rgba(15,15,17,0.75); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  #loading.show { display: flex; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 24px; font-size: 13px; color: var(--text); transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); z-index: 1000; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: #4a9e6e; color: #6ecf96; }
  #toast.error { border-color: #e05555; color: #f07070; }

  #mode-indicator { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 16px; font-size: 11px; color: var(--text-dim); pointer-events: none; z-index: 200; }
  #file-input { display: none; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span style="font-size:13px;color:var(--text-dim)" id="loading-msg">Processing...</span></div>
<div id="toast"></div>
<div id="mode-indicator">Mode: <span id="mode-text">Select a tool</span></div>
<input type="file" id="file-input" accept=".pdf">

<!-- Floating text formatting toolbar -->
<div id="text-toolbar">
  <button class="tb-btn" id="tb-bold" title="Bold" onclick="toggleBold()"><b>B</b></button>
  <div class="tb-sep"></div>
  <label style="font-size:11px;color:var(--text-dim)">Size:</label>
  <input type="number" id="tb-size" value="16" min="6" max="120" onchange="applyFontSize(this.value)">
  <input type="color" id="tb-color" value="#000000" onchange="applyColor(this.value)" title="Text color">
  <div class="tb-sep"></div>
  <button class="tb-btn tb-delete" onclick="deleteSelectedText()" title="Delete text">✕ Delete</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="logo">✦ PDF Editor</span>
  <div class="divider"></div>
  <button class="tool-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Open PDF
  </button>
  <div class="divider"></div>
  <button class="tool-btn" id="btn-select" onclick="setTool('select')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-3 6z"/></svg>Select
  </button>
  <button class="tool-btn" id="btn-mask" onclick="setTool('mask')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>White Mask
  </button>
  <button class="tool-btn" id="btn-text" onclick="setTool('text')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Add Text
  </button>
  <div id="text-controls">
    <label class="ctrl-label">Size:</label>
    <input type="number" id="font-size-input" value="16" min="6" max="120">
    <label class="ctrl-label">Color:</label>
    <input type="color" id="text-color-input" value="#000000">
    <button class="tool-btn" id="bold-toggle" onclick="toggleNewTextBold()" title="Bold">
      <b>B</b>
    </button>
  </div>
  <div class="divider"></div>
  <button class="tool-btn" id="undo-btn" onclick="undo()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>Undo
  </button>
  <div class="divider"></div>
  <button class="tool-btn" id="btn-scan" disabled onclick="applyScan()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>B&amp;W Scan
  </button>
  <button class="tool-btn" id="save-btn" disabled onclick="savePDF()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save PDF
  </button>
</div>

<!-- TABS -->
<div id="tabs-bar"></div>

<!-- MAIN -->
<div id="main">
  <div id="welcome">
    <h2>PDF Editor</h2>
    <p>Open a PDF to start editing — mask content, add text, apply B&amp;W scan.</p>
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <span style="color:var(--text-dim);font-size:13px">Click or drag & drop a PDF here</span>
    </div>
  </div>
  <div id="canvas-container" style="display:none">
    <div id="canvas-wrapper">
      <img id="pdf-image" alt="PDF Page">
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>
</div>

<script>
// ══════ STATE ══════
let state = {
  tool: 'select',
  pageCount: 0, currentPage: 0,
  renderInfo: {}, edits: {}, domElements: {}, history: [],
  pdfLoaded: false,
  newTextBold: false,
};
let drawing = { active: false, startX: 0, startY: 0, rect: null };
let selectedTextEl = null;   // currently selected text element
let selectedTextEdit = null; // corresponding edit object

// ══════ TOOL ══════
function setTool(tool) {
  state.tool = tool;
  ['select','mask','text'].forEach(t => document.getElementById('btn-'+t).classList.toggle('active', t===tool));
  document.getElementById('text-controls').classList.toggle('visible', tool==='text');
  const labels = {select:'Select & Move', mask:'Draw White Mask', text:'Click to Add Text'};
  document.getElementById('mode-text').textContent = labels[tool];
  const canvas = document.getElementById('draw-canvas');
  canvas.style.cursor = tool==='mask' ? 'crosshair' : tool==='text' ? 'text' : 'default';
  if (tool !== 'select') deselectText();
}

function toggleNewTextBold() {
  state.newTextBold = !state.newTextBold;
  document.getElementById('bold-toggle').classList.toggle('active', state.newTextBold);
}

// ══════ UPLOAD ══════
document.getElementById('file-input').addEventListener('change', e => { if(e.target.files[0]) uploadPDF(e.target.files[0]); });
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.pdf')) uploadPDF(f);
  else showToast('Please drop a PDF file','error');
});

async function uploadPDF(file) {
  showLoading('Uploading PDF...');
  const fd = new FormData(); fd.append('file', file);
  try {
    const res = await fetch('/upload', {method:'POST', body:fd});
    const data = await res.json();
    if (data.error) { showToast(data.error,'error'); hideLoading(); return; }
    state.pageCount=data.page_count; state.currentPage=0;
    state.edits={}; state.domElements={}; state.renderInfo={}; state.history=[];
    state.pdfLoaded=true;
    buildTabs();
    document.getElementById('welcome').style.display='none';
    document.getElementById('canvas-container').style.display='flex';
    document.getElementById('save-btn').disabled=false;
    document.getElementById('btn-scan').disabled=false;
    setTool('mask');
    await renderPage(0);
    hideLoading();
    showToast(`Loaded ${data.page_count} page${data.page_count>1?'s':''}`, 'success');
  } catch(err) { showToast('Upload failed: '+err.message,'error'); hideLoading(); }
}

// ══════ TABS ══════
function buildTabs() {
  const bar = document.getElementById('tabs-bar'); bar.innerHTML='';
  for(let i=0;i<state.pageCount;i++) {
    const t=document.createElement('button'); t.className='page-tab'+(i===0?' active':'');
    t.textContent=`Page ${i+1}`; t.onclick=()=>switchPage(i); bar.appendChild(t);
  }
}
async function switchPage(n) {
  if(n===state.currentPage) return;
  deselectText();
  document.querySelectorAll('.page-tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  state.currentPage=n;
  await renderPage(n);
}

// ══════ RENDER ══════
async function renderPage(pageNum) {
  showLoading(`Rendering page ${pageNum+1}...`);
  document.querySelectorAll('.mask-element,.text-overlay').forEach(el=>el.remove());
  try {
    const res = await fetch(`/render_page/${pageNum}`);
    const data = await res.json();
    if(data.error){showToast(data.error,'error');hideLoading();return;}
    const img=document.getElementById('pdf-image');
    img.src='data:image/png;base64,'+data.image;
    img.width=data.width; img.height=data.height;
    const canvas=document.getElementById('draw-canvas');
    canvas.width=data.width; canvas.height=data.height;
    canvas.style.width=data.width+'px'; canvas.style.height=data.height+'px';
    state.renderInfo[pageNum]={width:data.width,height:data.height,original_width:data.original_width,original_height:data.original_height,zoom:data.zoom};
    state.domElements[pageNum]=[];
    (state.edits[pageNum]||[]).forEach(edit=>renderEditElement(edit,pageNum));
    hideLoading();
  } catch(err){showToast('Render failed: '+err.message,'error');hideLoading();}
}

// ══════ CANVAS DRAWING ══════
const canvas = document.getElementById('draw-canvas');
canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mouseup', onMouseUp);

function getCanvasPos(e) {
  const r=canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height) };
}

function onMouseDown(e) {
  if(!state.pdfLoaded) return;
  if(state.tool==='mask') {
    drawing.active=true;
    const p=getCanvasPos(e); drawing.startX=p.x; drawing.startY=p.y;
    const tmp=document.createElement('div');
    tmp.style.cssText='position:absolute;border:2px dashed rgba(232,213,163,0.8);background:rgba(232,213,163,0.1);pointer-events:none;z-index:50;';
    document.getElementById('canvas-wrapper').appendChild(tmp);
    drawing.rect=tmp;
  } else if(state.tool==='text') {
    const p=getCanvasPos(e); addText(p.x,p.y);
  } else if(state.tool==='select') {
    deselectText();
  }
}

function onMouseMove(e) {
  if(!drawing.active||state.tool!=='mask') return;
  const p=getCanvasPos(e);
  const x=Math.min(p.x,drawing.startX), y=Math.min(p.y,drawing.startY);
  const w=Math.abs(p.x-drawing.startX), h=Math.abs(p.y-drawing.startY);
  const ds=canvas.getBoundingClientRect().width/canvas.width;
  drawing.rect.style.left=(x*ds)+'px'; drawing.rect.style.top=(y*ds)+'px';
  drawing.rect.style.width=(w*ds)+'px'; drawing.rect.style.height=(h*ds)+'px';
}

function onMouseUp(e) {
  if(!drawing.active||state.tool!=='mask') return;
  drawing.active=false;
  const p=getCanvasPos(e);
  const x=Math.min(p.x,drawing.startX), y=Math.min(p.y,drawing.startY);
  const w=Math.abs(p.x-drawing.startX), h=Math.abs(p.y-drawing.startY);
  if(drawing.rect){drawing.rect.remove();drawing.rect=null;}
  if(w<5||h<5) return;
  addEdit({type:'mask',x,y,width:w,height:h});
}

// ══════ ADD EDIT ══════
function addEdit(edit) {
  const p=state.currentPage;
  if(!state.edits[p]) state.edits[p]=[];
  state.edits[p].push(edit);
  state.history.push({page:p,edit});
  renderEditElement(edit,p);
}

// ══════ RENDER ELEMENT ══════
function renderEditElement(edit, pageNum) {
  if(pageNum!==state.currentPage) return;
  const wrapper=document.getElementById('canvas-wrapper');
  const ds=canvas.getBoundingClientRect().width/canvas.width;

  if(edit.type==='mask') {
    const el=document.createElement('div');
    el.className='mask-element';
    el.style.left=(edit.x*ds)+'px'; el.style.top=(edit.y*ds)+'px';
    el.style.width=(edit.width*ds)+'px'; el.style.height=(edit.height*ds)+'px';
    const del=document.createElement('div'); del.className='delete-mask'; del.innerHTML='✕';
    del.onclick=ev=>{ev.stopPropagation();removeEdit(edit,pageNum,el);};
    el.appendChild(del);
    const rh=document.createElement('div'); rh.className='resize-handle';
    makeMaskResizable(el,edit,ds,rh); el.appendChild(rh);
    makeDraggable(el,edit,ds);
    wrapper.appendChild(el);
    if(!state.domElements[pageNum]) state.domElements[pageNum]=[];
    state.domElements[pageNum].push(el);

  } else if(edit.type==='text') {
    const el=document.createElement('div');
    el.className='text-overlay';
    el.textContent=edit.text;
    el.style.left=(edit.x*ds)+'px';
    el.style.top=(edit.y*ds)+'px';
    el.style.fontSize=(edit.fontSize*ds)+'px';
    el.style.color=edit.color;
    el.style.fontFamily='Arial, Helvetica, sans-serif';
    el.style.fontWeight=edit.bold?'bold':'normal';
    el.style.zIndex=20;

    // Click to select
    el.addEventListener('mousedown', ev => {
      if(state.tool==='select'||state.tool==='text') {
        ev.stopPropagation();
        selectText(el, edit);
      }
    });

    makeDraggable(el, edit, ds);
    wrapper.appendChild(el);
    if(!state.domElements[pageNum]) state.domElements[pageNum]=[];
    state.domElements[pageNum].push(el);
    // Auto-select newly added text
    setTimeout(()=>selectText(el,edit),30);
  }
}

// ══════ TEXT SELECTION & FLOATING TOOLBAR ══════
function selectText(el, edit) {
  // Deselect previous
  if(selectedTextEl && selectedTextEl!==el) selectedTextEl.classList.remove('selected');

  selectedTextEl=el; selectedTextEdit=edit;
  el.classList.add('selected');

  // Show floating toolbar above the element
  const toolbar=document.getElementById('text-toolbar');
  const wrapperRect=document.getElementById('canvas-wrapper').getBoundingClientRect();
  const elRect=el.getBoundingClientRect();

  // Position toolbar above the text element
  const topPos=elRect.top - wrapperRect.top - 48;
  const leftPos=elRect.left - wrapperRect.left;

  toolbar.style.top=Math.max(4, topPos)+'px';
  toolbar.style.left=Math.max(4, leftPos)+'px';
  toolbar.style.position='absolute';
  document.getElementById('canvas-wrapper').appendChild(toolbar);

  // Sync toolbar state to current text
  document.getElementById('tb-size').value=edit.fontSize||16;
  document.getElementById('tb-color').value=edit.color||'#000000';
  document.getElementById('tb-bold').classList.toggle('active', !!edit.bold);

  toolbar.classList.add('visible');
}

function deselectText() {
  if(selectedTextEl) selectedTextEl.classList.remove('selected');
  selectedTextEl=null; selectedTextEdit=null;
  document.getElementById('text-toolbar').classList.remove('visible');
}

function toggleBold() {
  if(!selectedTextEdit) return;
  selectedTextEdit.bold = !selectedTextEdit.bold;
  selectedTextEl.style.fontWeight = selectedTextEdit.bold ? 'bold' : 'normal';
  document.getElementById('tb-bold').classList.toggle('active', selectedTextEdit.bold);
}

function applyFontSize(val) {
  if(!selectedTextEdit) return;
  const size=Math.max(6, Math.min(120, parseInt(val)||16));
  selectedTextEdit.fontSize=size;
  const ds=canvas.getBoundingClientRect().width/canvas.width;
  selectedTextEl.style.fontSize=(size*ds)+'px';
  // Reposition toolbar after resize
  setTimeout(()=>selectText(selectedTextEl, selectedTextEdit), 50);
}

function applyColor(val) {
  if(!selectedTextEdit) return;
  selectedTextEdit.color=val;
  selectedTextEl.style.color=val;
}

function deleteSelectedText() {
  if(!selectedTextEl||!selectedTextEdit) return;
  removeEdit(selectedTextEdit, state.currentPage, selectedTextEl);
  deselectText();
}

// ══════ ADD TEXT ══════
function addText(x, y) {
  const fontSize=parseInt(document.getElementById('font-size-input').value)||16;
  const color=document.getElementById('text-color-input').value;
  const bold=state.newTextBold;
  const edit={type:'text',x,y,text:'Type here',fontSize,color,bold};
  addEdit(edit);
}

// ══════ DRAG ══════
function makeDraggable(el, edit, ds) {
  let drag=false, sx, sy, ex, ey;
  el.addEventListener('mousedown', e=>{
    if(e.target.classList.contains('delete-mask')||e.target.classList.contains('resize-handle')) return;
    drag=true; sx=e.clientX; sy=e.clientY;
    ex=parseFloat(el.style.left); ey=parseFloat(el.style.top);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!drag) return;
    const nl=ex+(e.clientX-sx), nt=ey+(e.clientY-sy);
    el.style.left=nl+'px'; el.style.top=nt+'px';
    edit.x=nl/ds; edit.y=nt/ds;
    // Move floating toolbar with text
    if(el===selectedTextEl) {
      const tb=document.getElementById('text-toolbar');
      tb.style.top=Math.max(4,(nt-48))+'px';
      tb.style.left=Math.max(4,nl)+'px';
    }
  });
  document.addEventListener('mouseup', ()=>{ drag=false; });
}

function makeMaskResizable(el, edit, ds, handle) {
  let resizing=false, sx, sy, sw, sh;
  handle.addEventListener('mousedown', e=>{
    resizing=true; sx=e.clientX; sy=e.clientY;
    sw=parseFloat(el.style.width); sh=parseFloat(el.style.height);
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e=>{
    if(!resizing) return;
    const nw=Math.max(20,sw+(e.clientX-sx)), nh=Math.max(20,sh+(e.clientY-sy));
    el.style.width=nw+'px'; el.style.height=nh+'px';
    edit.width=nw/ds; edit.height=nh/ds;
  });
  document.addEventListener('mouseup', ()=>{ resizing=false; });
}

// ══════ REMOVE EDIT ══════
function removeEdit(edit, pageNum, el) {
  el.remove();
  const edits=state.edits[pageNum];
  if(edits){const i=edits.indexOf(edit);if(i>-1)edits.splice(i,1);}
  const doms=state.domElements[pageNum];
  if(doms){const i=doms.indexOf(el);if(i>-1)doms.splice(i,1);}
}

// ══════ UNDO ══════
function undo() {
  if(!state.history.length){showToast('Nothing to undo');return;}
  const last=state.history.pop();
  const edits=state.edits[last.page];
  if(edits){const i=edits.lastIndexOf(last.edit);if(i>-1)edits.splice(i,1);}
  if(last.page===state.currentPage) rerenderCurrentPage();
}
async function rerenderCurrentPage() {
  deselectText();
  document.querySelectorAll('.mask-element,.text-overlay').forEach(el=>el.remove());
  state.domElements[state.currentPage]=[];
  (state.edits[state.currentPage]||[]).forEach(edit=>renderEditElement(edit,state.currentPage));
}

// ══════ SAVE PDF ══════
async function savePDF() {
  if(!state.pdfLoaded) return;
  showLoading('Saving PDF...');
  try {
    const res=await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({edits:state.edits,render_info:state.renderInfo})});
    const data=await res.json();
    if(data.error){showToast(data.error,'error');console.error(data.traceback);hideLoading();return;}
    const a=document.createElement('a'); a.href='/download/'+encodeURIComponent(data.filename); a.download=data.filename;
    document.body.appendChild(a); a.click(); a.remove();
    hideLoading(); showToast('PDF saved and downloading!','success');
  } catch(err){showToast('Save failed: '+err.message,'error');hideLoading();}
}

// ══════ B&W SCAN (includes edits) ══════
async function applyScan() {
  if(!state.pdfLoaded){showToast('Please open a PDF first','error');return;}
  if(!confirm('Apply B&W scan effect to the entire PDF?\nAll your masks and text will be included.\nThis will download a new scanned copy.')) return;
  showLoading('Applying B&W scan... please wait');
  try {
    const res=await fetch('/apply_scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({edits:state.edits,render_info:state.renderInfo})});
    const data=await res.json();
    if(data.error){showToast(data.error,'error');console.error(data.traceback);hideLoading();return;}
    const a=document.createElement('a'); a.href='/download/'+encodeURIComponent(data.filename); a.download=data.filename;
    document.body.appendChild(a); a.click(); a.remove();
    hideLoading(); showToast('B&W scan applied — downloading!','success');
  } catch(err){showToast('Scan failed: '+err.message,'error');hideLoading();}
}

// ══════ UI HELPERS ══════
function showLoading(msg='Processing...'){document.getElementById('loading-msg').textContent=msg;document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
let toastTimer;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='',3500);}

// Close text toolbar when clicking outside
document.addEventListener('mousedown', e=>{
  const toolbar=document.getElementById('text-toolbar');
  if(!toolbar.contains(e.target) && !e.target.classList.contains('text-overlay')) deselectText();
});

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='Escape'){setTool('select');deselectText();}
  if(!selectedTextEl){
    if(e.key==='m') setTool('mask');
    if(e.key==='t') setTool('text');
  }
  // Delete selected text with Delete key
  if(e.key==='Delete'&&selectedTextEl) deleteSelectedText();
});

window.addEventListener('resize',()=>{if(state.pdfLoaded)rerenderCurrentPage();});
setTool('select');
</script>
